{% extends "base.html" %}

{% block content %}
<div class="d-flex justify-content-between align-items-center mt-3 mb-4">
    <h2>Tag List</h2>
    <a href="{% url 'todo:tag-create' %}" class="btn btn-primary">Add Tag</a>
</div>

<div class="card shadow-sm">
    <div class="card-body p-0">
        <table class="table table-hover table-striped mb-0">
            <thead class="thead-dark">
                <tr>
                    <th scope="col" class="pl-4">Tag Name</th>
                    <th scope="col" class="text-right pr-4">Actions</th>
                </tr>
            </thead>
            <tbody>
                {% for tag in tags %}
                    <tr>
                        <td class="align-middle pl-4 font-weight-bold">
                            <span class="badge badge-info p-2">{{ tag.name }}</span>
                        </td>
                        <td class="align-middle text-right pr-4">
                            <a href="{% url 'todo:tag-update' pk=tag.pk %}" class="btn btn-sm btn-outline-primary">Update</a>
                            <a href="{% url 'todo:tag-delete' pk=tag.pk %}" class="btn btn-sm btn-outline-danger ml-2">Delete</a>
                        </td>
                    </tr>
                {% empty %}
                    <tr>
                        <td colspan="2" class="text-center text-muted py-4">
                            No tags created yet. Click "Add Tag" to create one!
                        </td>
                    </tr>
                {% endfor %}
            </tbody>
        </table>
    </div>
</div>
{% endblock %}
