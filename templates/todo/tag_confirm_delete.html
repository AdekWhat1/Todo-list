{% extends "base.html" %}

{% block content %}
<div class="row justify-content-center mt-5">
    <div class="col-md-6">
        <div class="card border-danger shadow-sm">
            <div class="card-header bg-danger text-white">
                <h4 class="mb-0">Confirm Delete Tag</h4>
            </div>
            <div class="card-body text-center">
                <p class="lead">Are you sure you want to delete the tag <strong class="text-danger">"{{ object.name }}"</strong>?</p>
                <p class="text-muted small">Note: This will not delete the tasks associated with this tag</p>
                <form method="post" class="mt-4">
                    {% csrf_token %}
                    <button type="submit" class="btn btn-danger px-4">Yes, Delete</button>
                    <a href="{% url 'todo:tag-list' %}" class="btn btn-outline-secondary ml-2 px-4">Cancel</a>
                </form>
            </div>
        </div>
    </div>
</div>
{% endblock %}
