{% extends "base.html" %}

{% block content %}
<div class="row justify-content-center mt-5">
    <div class="col-md-6">
        <div class="card border-danger shadow-sm">
            <div class="card-header bg-danger text-white">
                <h4 class="mb-0">Confirm Delete Task</h4>
            </div>
            <div class="card-body text-center">
                <p class="lead">Are you sure you want to delete this task?</p>
                <blockquote class="blockquote bg-light p-3 border-left rounded">
                    <p class="mb-0 font-italic">"{{ object.content }}"</p>
                </blockquote>
                <form method="post" class="mt-4">
                    {% csrf_token %}
                    <button type="submit" class="btn btn-danger px-4">Yes, Delete</button>
                    <a href="{% url 'todo:task-list' %}" class="btn btn-outline-secondary ml-2 px-4">Cancel</a>
                </form>
            </div>
        </div>
    </div>
</div>
{% endblock %}
